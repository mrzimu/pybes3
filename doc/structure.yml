      trackIndex: int # Track ID wensp Add 2005-10-19
      id: int # Muc Identifier
      status: int # Muc Status
      type: int # Method of judge?
      startPart: int # In which part does the start position of track locate
      endPart: int # In which part does the end position of track locate
