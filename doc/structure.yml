      ecLastLayer: int # Last layer with hits in endcap
      numHits: int # Number of hits on track
      numLayers: int # Number of layer with hits
      maxHitsInLayer: int # Max number of hits in a layer
      depth: double # Depth of iron penetrated
      chi2: double # Fit parameters
      dof: int
      rms: double
