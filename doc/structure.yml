      deltaPhi: double
      kalrechi2: double
      kaldof: int
      kaldepth: double
      kalbrLastLayer: int
      kalecLastLayer: int

    TMdcDedx(RaggedArray):
      trackIndex: int # Track Id wensp Add 2005-10-19
      particleId: int # Particle ID from De/Dx fit
      status: int # Status
      trunc_alg: int # truncate method
      chiE: double # Number of sigama from e
      chiMu: double # Number of sigama from muon
      chiPi: double # Number of sigama from pion
      chiK: double # Number of sigama from k
      chiP: double # Number of sigama from p
      numGoodHits: int # No. of good de/dx hits(exclude overflow)
      numTotalHits: int # No. of good de/dx hits(include overflow)
      probPH: double # Most probable pulse height from truncated mean
      normPH: double # normalizd pulse height # Changed on Oct. 10 following by Wangdy
      errorPH: double # resolution of truncated mean
      twentyPH: double # de/dx value of bitrunction rate equal to 20%

    TExtTrack(RaggedArray):
      trackIndex: int # Track Id wensp Add 2005-10-19
      Tof1PositionX: double # Position when the particle enters the TOF layer1.
      Tof1PositionY: double # Position when the particle enters the TOF layer1
      Tof1PositionZ: double # Position when the particle enters the TOF layer1
      Tof1MomentumX: double # Momentum when the particle enters the TOF layer1.
      Tof1MomentumY: double # Momentum when the particle enters the TOF layer1.
      Tof1MomentumZ: double # Momentum when the particle enters the TOF layer1.
