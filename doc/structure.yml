      Tof2PosSigmaAlongT: double # Sigma along Z x R
      Tof2PosSigmaAlongX: double # Sigma X
      Tof2PosSigmaAlongY: double # Sigma Y
      Tof2ErrorMatrix: double[21] # Error matrix 6x6 (x,p)

